<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, env(safe-area-inset-top), env(safe-area-inset-bottom)">
    <title>Music Play</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Music Play">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3844/3844724.png">
    <style>
        :root {
            --primary: #ffa500;
            --secondary: #ff4500;
            --bg-dark: #121212;
            --bg-surface: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        #sidebar {
            position: fixed;
            top: env(safe-area-inset-top);
            left: -280px;
            bottom: env(safe-area-inset-bottom);
            width: 280px;
            background-color: var(--bg-surface);
            z-index: 10;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }

        #sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .import-btn-wrapper {
            position: relative;
            display: inline-block;
        }

        .import-btn-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .btn-import {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
        }

        .track-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .track-item {
            padding: 12px 10px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
        }

        .track-item:hover, .track-item.active {
            background-color: rgba(255, 165, 0, 0.2);
            color: var(--primary);
        }

        #main-player {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            width: 100%;
        }

        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-menu {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--text-main);
            cursor: pointer;
        }

        .app-title {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .album-art-area {
            width: 260px;
            height: 260px;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 2px solid rgba(255, 165, 0, 0.3);
        }

        .album-art-placeholder {
            font-size: 5rem;
            display: inline-block;
            transform-origin: center;
        }

        .track-info {
            text-align: center;
            width: 100%;
            padding: 0 20px;
        }

        .track-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .progress-container {
            width: 100%;
            padding: 0 10px;
        }

        .progress-bar-wrapper {
            position: relative;
            width: 100%;
            height: 6px;
            background-color: #333;
            border-radius: 3px;
            cursor: pointer;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border-radius: 3px;
            width: 0%;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            max-width: 360px;
        }

        .btn-control {
            background: none;
            border: none;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s ease;
        }

        .btn-control:active {
            transform: scale(0.85);
        }

        .btn-secondary-control {
            font-size: 1.5rem;
            opacity: 0.6;
        }

        .btn-secondary-control.active {
            opacity: 1;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .btn-main-control {
            font-size: 2.2rem;
        }

        .btn-play-pause {
            font-size: 3.5rem;
        }

        h2.credits-header {
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.5;
            margin-top: 10px;
            font-weight: normal;
            text-align: center;
        }

        #sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            z-index: 5;
            display: none;
        }

        #sidebar-overlay.show {
            display: block;
        }
    </style>
</head>
<body>

    <div id="sidebar-overlay"></div>

    <div id="sidebar">
        <div class="sidebar-header">
            <h3>Músicas</h3>
            <div class="import-btn-wrapper">
                <button class="btn-import">📥</button>
                <input type="file" id="dir-input" webkitdirectory directory multiple>
            </div>
        </div>
        <div class="track-list" id="playlist-container"></div>
    </div>

    <div id="main-player">
        <div class="top-bar">
            <button class="btn-menu" id="menu-toggle">☰</button>
            <div class="app-title">Music Play</div>
            <div style="width: 1.8rem;"></div>
        </div>

        <div class="album-art-area">
            <div class="album-art-placeholder" id="disc-icon">🎵</div>
        </div>

        <div class="track-info">
            <div class="track-title" id="display-title">Nenhuma faixa</div>
            <div class="track-artist" id="display-artist">Selecione uma pasta</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar-wrapper" id="progress-wrapper">
                <div class="progress-bar" id="progress-fill"></div>
            </div>
            <div class="time-info">
                <span id="current-time">00:00</span>
                <span id="total-duration">00:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn-control btn-secondary-control" id="shuffle-btn">🔀</button>
            <button class="btn-control btn-main-control" id="prev-btn">⏪️</button>
            <button class="btn-control btn-play-pause" id="play-btn">▶️</button>
            <button class="btn-control btn-main-control" id="next-btn">⏩️</button>
            <button class="btn-control btn-secondary-control active" id="loop-btn">⏹</button>
        </div>

        <h2 class="credits-header">Made By: @085_Teuzinnn</h2>
    </div>

    <audio id="audio-element" preload="auto"></audio>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }

        const audio = document.getElementById('audio-element');
        const dirInput = document.getElementById('dir-input');
        const playlistContainer = document.getElementById('playlist-container');
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const loopBtn = document.getElementById('loop-btn');
        
        const progressWrapper = document.getElementById('progress-wrapper');
        const progressFill = document.getElementById('progress-fill');
        const currentTimeDisplay = document.getElementById('current-time');
        const totalDurationDisplay = document.getElementById('total-duration');
        
        const displayTitle = document.getElementById('display-title');
        const displayArtist = document.getElementById('display-artist');
        const discIcon = document.getElementById('disc-icon');

        let songs = [];
        let currentTrackIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let loopMode = 0; 
        let db;
        let oldObjectURL = null;

        const dbRequest = indexedDB.open("MusicPlayPWA", 1);

        dbRequest.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("tracks")) {
                db.objectStoreNames.createObjectStore("tracks", { keyPath: "id", autoIncrement: true });
            }
        };

        dbRequest.onsuccess = (e) => {
            db = e.target.result;
            loadSongsFromStorage();
        };

        function saveSongsToStorage(files) {
            const transaction = db.transaction(["tracks"], "readwrite");
            const store = transaction.objectStore("tracks");
            const clearRequest = store.clear();
            
            clearRequest.onsuccess = () => {
                files.forEach((file) => {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const buffer = event.target.result;
                        const dataToSave = {
                            name: file.name,
                            type: file.type,
                            buffer: buffer
                        };
                        const addTx = db.transaction(["tracks"], "readwrite");
                        addTx.objectStore("tracks").add(dataToSave);
                    };
                    reader.readAsArrayBuffer(file);
                });
            };
        }

        function loadSongsFromStorage() {
            const transaction = db.transaction(["tracks"], "readonly");
            const store = transaction.objectStore("tracks");
            const getAllRequest = store.getAll();

            getAllRequest.onsuccess = () => {
                const records = getAllRequest.result;
                if (records && records.length > 0) {
                    songs = records.map(r => {
                        const blob = new Blob([r.buffer], { type: r.type || 'audio/mp3' });
                        blob.name = r.name;
                        return blob;
                    });
                    songs.sort((a, b) => a.name.localeCompare(b.name));
                    renderPlaylist();
                    loadTrack(0);
                }
            };
        }

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        menuToggle.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        dirInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            const filtered = files.filter(file => file.type.startsWith('audio/') || file.name.endsWith('.mp3') || file.name.endsWith('.wav') || file.name.endsWith('.m4a') || file.name.endsWith('.ogg'));
            
            if (filtered.length > 0) {
                songs = filtered;
                songs.sort((a, b) => a.name.localeCompare(b.name));
                saveSongsToStorage(songs);
                renderPlaylist();
                loadTrack(0);
                toggleSidebar();
            }
        });

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            songs.forEach((song, index) => {
                const item = document.createElement('div');
                item.classList.add('track-item');
                if (index === currentTrackIndex) item.classList.add('active');
                item.textContent = song.name.replace(/\.[^/.]+$/, "");
                item.addEventListener('click', () => {
                    loadTrack(index);
                    playTrack();
                    toggleSidebar();
                });
                playlistContainer.appendChild(item);
            });
        }

        function updateSystemMedia(trackName) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: trackName,
                    artist: 'Music Play',
                    album: 'Biblioteca Local'
                });
                navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
            }
        }

        function loadTrack(index) {
            if (songs.length === 0) return;
            
            currentTrackIndex = index;
            const song = songs[index];
            
            if (oldObjectURL) {
                URL.revokeObjectURL(oldObjectURL);
            }
            
            const objectURL = URL.createObjectURL(song);
            oldObjectURL = objectURL;
            audio.src = objectURL;
            audio.load();
            
            const cleanName = song.name.replace(/\.[^/.]+$/, "");
            displayTitle.textContent = cleanName;
            displayArtist.textContent = "Arquivo Local";
            
            updateSystemMedia(cleanName);
            
            const items = playlistContainer.querySelectorAll('.track-item');
            items.forEach((item, idx) => {
                if (idx === index) {
                    item.classList.add('active');
                    item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function playTrack() {
            if (songs.length === 0) return;
            audio.play().then(() => {
                isPlaying = true;
                playBtn.textContent = '⏸️';
                discIcon.style.animation = 'spin 4s linear infinite';
                updateSystemMedia(displayTitle.textContent);
            }).catch(() => {});
        }

        function pauseTrack() {
            audio.pause();
            isPlaying = false;
            playBtn.textContent = '▶️';
            discIcon.style.animation = 'none';
            updateSystemMedia(displayTitle.textContent);
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                pauseTrack();
            } else {
                if (songs.length > 0) {
                    if (!audio.src) loadTrack(currentTrackIndex);
                    playTrack();
                }
            }
        });

        function nextTrack() {
            if (songs.length === 0) return;

            if (isShuffle) {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * songs.length);
                } while (randomIndex === currentTrackIndex && songs.length > 1);
                loadTrack(randomIndex);
            } else {
                let nextIndex = currentTrackIndex + 1;
                if (nextIndex >= songs.length) {
                    nextIndex = 0;
                }
                loadTrack(nextIndex);
            }
            playTrack();
        }

        function prevTrack() {
            if (songs.length === 0) return;

            let prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) {
                prevIndex = songs.length - 1;
            }
            loadTrack(prevIndex);
            playTrack();
        }

        nextBtn.addEventListener('click', nextTrack);
        prevBtn.addEventListener('click', prevTrack);

        shuffleBtn.addEventListener('click', () => {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('active', isShuffle);
        });

        loopBtn.addEventListener('click', () => {
            loopMode = (loopMode + 1) % 3;
            if (loopMode === 0) {
                loopBtn.textContent = '⏹';
                loopBtn.classList.add('active');
            } else if (loopMode === 1) {
                loopBtn.textContent = '🔁';
                loopBtn.classList.add('active');
            } else if (loopMode === 2) {
                loopBtn.textContent = '🔂';
                loopBtn.classList.add('active');
            }
        });

        audio.addEventListener('ended', () => {
            if (loopMode === 2) {
                audio.currentTime = 0;
                playTrack();
            } else if (loopMode === 1) {
                nextTrack();
            } else if (loopMode === 0) {
                if (currentTrackIndex === songs.length - 1 && !isShuffle) {
                    pauseTrack();
                } else {
                    nextTrack();
                }
            }
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        audio.addEventListener('timeupdate', () => {
            const current = audio.currentTime;
            const duration = audio.duration;
            if (duration) {
                const percentage = (current / duration) * 100;
                progressFill.style.width = `${percentage}%`;
                currentTimeDisplay.textContent = formatTime(current);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            totalDurationDisplay.textContent = formatTime(audio.duration);
        });

        progressWrapper.addEventListener('click', (e) => {
            if (!audio.duration) return;
            const rect = progressWrapper.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const newTime = (clickX / width) * audio.duration;
            audio.currentTime = newTime;
        });

        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => playTrack());
            navigator.mediaSession.setActionHandler('pause', () => pauseTrack());
            navigator.mediaSession.setActionHandler('previoustrack', () => prevTrack());
            navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack());
        }

        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes spin {
                100% { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>
